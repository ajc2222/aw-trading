name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint-and-check:
    name: HTML Lint & Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: HTMLHint — lint root HTML files
        run: |
          npx --yes htmlhint \
            index.html \
            404.html \
            giveaways.html \
            indicator.html \
            prop-firms.html

      - name: Check broken internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --no-progress
            --exclude-external
            --exclude "^mailto:"
            index.html
            404.html
            giveaways.html
            indicator.html
            prop-firms.html
          fail: true

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
