<style>
:root {
  --bg:#070709; --surface:rgba(255,255,255,0.04); --line:rgba(255,255,255,0.08);
  --white:#fff; --muted:#888; --blue:#2E6BFF; --blue-light:#6699ff;
  --red:#ff5c5c; --green:#4ade80; --orange:#f59e0b;
}
*{box-sizing:border-box;}
body{background:var(--bg);color:var(--white);font-family:'Archivo',sans-serif;margin:0;padding:40px 24px;}
.wrap{max-width:960px;margin:0 auto;}
/* Hero */
.hero{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;margin-bottom:28px;}
.hero h1{font-size:26px;margin:0 0 4px;}
.hero .sub{color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:13px;}
.countdown{text-align:right;}
.countdown .num{font-size:40px;font-weight:900;color:var(--blue-light);line-height:1;}
.countdown .lbl{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
/* Cards */
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:20px 24px;margin-bottom:20px;}
.card-title{font-size:15px;font-weight:700;margin:0 0 4px;}
.card-sub{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:14px;}
/* Progress bar */
.bar-wrap{margin-bottom:6px;}
.bar-label{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:6px;}
.bar{background:rgba(255,255,255,0.06);border-radius:6px;height:8px;overflow:hidden;}
.fill{background:linear-gradient(90deg,var(--blue),var(--blue-light));height:100%;border-radius:6px;transition:width .4s;}
/* Overdue */
.overdue-card{background:rgba(255,92,92,0.06);border:1px solid rgba(255,92,92,0.22);border-radius:14px;padding:18px 22px;margin-bottom:20px;}
.overdue-card .oc-title{color:var(--red);font-family:'IBM Plex Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;font-weight:600;}
/* Today card */
.today-card{background:rgba(46,107,255,0.07);border:1px solid rgba(46,107,255,0.28);border-radius:14px;padding:18px 22px;margin-bottom:20px;}
.today-card .tc-title{color:var(--blue-light);font-family:'IBM Plex Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;font-weight:600;}
/* Task list */
.tasks{list-style:none;margin:0;padding:0;}
.tasks li{display:flex;align-items:flex-start;gap:10px;font-size:13.5px;line-height:1.5;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.tasks li:last-child{border-bottom:none;}
.chk{flex-shrink:0;margin-top:1px;font-size:14px;}
.chk.done{color:var(--green);}
.chk.open{color:var(--blue-light);}
.chk.over{color:var(--red);}
.task-text{flex:1;}
.task-text.done{color:var(--muted);text-decoration:line-through;}
.task-meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);flex-shrink:0;margin-top:2px;}
/* Week sections */
.week-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.week-head h3{margin:0;font-size:15px;}
.week-pct{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);}
.day-group{margin-top:14px;}
.day-label{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;}
/* Indicator section */
.ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-top:2px;}
.ind-item{background:rgba(255,255,255,0.03);border:1px solid var(--line);border-radius:10px;padding:11px 14px;display:flex;align-items:flex-start;gap:10px;}
.ind-item.done{border-color:rgba(74,222,128,0.2);}
.ind-item.inprog{border-color:rgba(46,107,255,0.32);}
.ind-icon{font-size:15px;flex-shrink:0;margin-top:1px;}
.ind-name{font-size:13px;font-weight:600;}
.ind-status{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px;}
.ind-item.done .ind-status{color:var(--green);}
.ind-item.inprog .ind-status{color:var(--blue-light);}
.ind-deadlines{display:flex;gap:24px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line);}
.dl-item .dl-date{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--blue-light);}
.dl-item .dl-desc{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px;}
footer{text-align:center;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;margin-top:36px;padding-top:20px;border-top:1px solid var(--line);}
</style>

    <div>
      <h1>AW Trading — Launch Dashboard</h1>
      <div class="sub">Week ${getWeek(today)} of 8 · ${today.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>
    </div>
    <div class="countdown">
      <div class="num">${daysUntil()}</div>
      <div class="lbl">days to Sept 1 launch</div>
    </div>
  </div>`;

  // Overall progress
  html+=`<div class="card">
    <div class="bar-label">Campaign Progress — ${doneCount}/${total} tasks complete (${pct}%)</div>
    <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
  </div>`;

  // Indicator section
  html+=`<div class="card">
    <div class="card-title">AW Indicator — Feature Progress</div>
    <div class="card-sub">${indDone}/${indTotal} features complete · Tease-ready deadline Aug 3</div>
    <div class="ind-grid">`;
  INDICATOR.forEach(f=>{
    const icon = f.status==='done'?'✅':f.status==='inprog'?'🔄':'○';
    html+=`<div class="ind-item ${f.status}">
      <div class="ind-icon">${icon}</div>
      <div><div class="ind-name">${f.name}</div><div class="ind-status">${f.note}</div></div>
    </div>`;
  });
  html+=`</div>
    <div class="ind-deadlines">
      <div class="dl-item"><div class="dl-date">Aug 3</div><div class="dl-desc">Tease-ready on camera</div></div>
      <div class="dl-item"><div class="dl-date">Aug 10</div><div class="dl-desc">Fully polished for reveal</div></div>
      <div class="dl-item"><div class="dl-date">Sept 1</div><div class="dl-desc">Launch day</div></div>
    </div>
  </div>`;

  // Overdue
  if(overdue.length){
    html+=`<div class="overdue-card">
      <div class="oc-title">⚠ Carry Forward — ${overdue.length} overdue task${overdue.length>1?'s':''}</div>
      <ul class="tasks">`;
    overdue.forEach(t=>{
      html+=`<li><span class="chk over">!</span><span class="task-text">${t.text}</span><span class="task-meta">${fmtDate(t.date)}</span></li>`;
    });
    html+=`</ul></div>`;
  }

  // Today
  if(todayTasks.length){
    html+=`<div class="today-card">
      <div class="tc-title">Today — ${today.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}</div>
      <ul class="tasks">`;
    todayTasks.forEach(t=>{
      const icon=t.done?'✓':'○', cls=t.done?'done':'open';
      html+=`<li><span class="chk ${cls}">${icon}</span><span class="task-text${t.done?' done':''}">${t.text}</span></li>`;
    });
    html+=`</ul></div>`;
  }

  // Upcoming weeks
  upcoming.forEach((tasks,section)=>{
    const allDone=tasks.every(t=>t.done);
    const doneCnt=tasks.filter(t=>t.done).length;
    html+=`<div class="card">
      <div class="week-head">
        <h3 style="font-size:14px">${section}</h3>
        <span class="week-pct">${doneCnt}/${tasks.length}</span>
      </div>
      <ul class="tasks">`;
    tasks.forEach(t=>{
      const icon=t.done?'✓':'○', cls=t.done?'done':'open';
      html+=`<li><span class="chk ${cls}">${icon}</span><span class="task-text${t.done?' done':''}">${t.text}</span></li>`;
    });
    html+=`</ul></div>`;
  });

  html+=`<footer>Tell Claude when tasks are done — it updates the COMPLETED set in docs/dashboard.html · Auto-refreshes on open</footer>`;

  document.getElementById('root').innerHTML=html;
})();

function getWeek(d){
  const start=new Date(2026,6,6); // Jul 6
  const diff=d-start;
  const w=Math.floor(diff/(7*24*60*60*1000))+1;
  return Math.max(1,Math.min(8,w));
}
</script>
