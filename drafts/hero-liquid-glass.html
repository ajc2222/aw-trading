<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AW Trading — Hero Prototype (Liquid Glass)</title>
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,300..900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070709;
  --white:#F5F6F8;
  --muted:#9298A6;
  --line:rgba(255,255,255,.12);
  --line-strong:rgba(255,255,255,.26);
  --white-glow:rgba(255,255,255,.10);
  --white-glow-hard:rgba(255,255,255,.18);
  --blue:#2E6BFF;
  --blue-glow:rgba(46,107,255,.4);
  --glass-hi:rgba(255,255,255,.09);
  --glass-lo:rgba(255,255,255,.035);
  --mono:'IBM Plex Mono',monospace;
  --disp:'Archivo',sans-serif;
  --max:1080px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--disp);background:var(--bg);color:var(--white);line-height:1.55;font-size:16px;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:var(--blue);color:#fff}
a{color:inherit;text-decoration:none}
.wrap{max-width:var(--max);margin:0 auto;padding:0 24px}
.eyebrow{font-family:var(--mono);font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--white);font-weight:600;display:inline-flex;align-items:center;gap:10px;opacity:.9}
.eyebrow::before{content:"";width:26px;height:2px;background:var(--white)}
h1,h2,h3{font-family:var(--disp);letter-spacing:-.02em}
:focus-visible{outline:2px solid var(--blue);outline-offset:3px;border-radius:4px}

/* ---------- LIQUID LAYER (blue = motion, lives behind the glass) ---------- */
.liquid{position:fixed;inset:0;z-index:0;pointer-events:none;filter:blur(80px) saturate(1.1);opacity:.42}
.blob{position:absolute;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(46,107,255,.5),rgba(46,107,255,.04) 70%);mix-blend-mode:screen;will-change:transform}
.b1{width:55vmax;height:55vmax;top:-24vmax;left:-18vmax;animation:drift1 28s ease-in-out infinite alternate}
.b2{width:44vmax;height:44vmax;top:34%;right:-20vmax;animation:drift2 34s ease-in-out infinite alternate}
.b3{width:38vmax;height:38vmax;bottom:-16vmax;left:22%;animation:drift3 24s ease-in-out infinite alternate;opacity:.75}
@keyframes drift1{from{transform:translate(0,0) scale(1)}to{transform:translate(10vmax,8vmax) scale(1.1)}}
@keyframes drift2{from{transform:translate(0,0) scale(1.05)}to{transform:translate(-9vmax,-7vmax) scale(.9)}}
@keyframes drift3{from{transform:translate(0,0)}to{transform:translate(9vmax,-6vmax)}}
.grain{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.3;background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:3px 3px}
nav,header{position:relative;z-index:2}

/* ---------- GLASS RECIPE ---------- */
.glass{
  background:linear-gradient(160deg,var(--glass-hi),var(--glass-lo) 50%);
  backdrop-filter:blur(18px) saturate(1.3);
  -webkit-backdrop-filter:blur(18px) saturate(1.3);
  border:1px solid var(--line);
  box-shadow:0 1px 0 rgba(255,255,255,.15) inset,0 -1px 0 rgba(255,255,255,.03) inset,0 16px 44px -26px rgba(0,0,0,.9);
}

.btn{display:inline-flex;align-items:center;gap:10px;font-weight:700;font-size:.95rem;padding:15px 28px;border-radius:99px;cursor:pointer;border:none;transition:transform .2s cubic-bezier(.2,.8,.2,1),box-shadow .3s,border-color .3s;font-family:var(--disp)}
.btn-white{background:linear-gradient(180deg,#FFFFFF,#DCE2F0);color:#0A0A0B;border:1px solid rgba(255,255,255,.7);box-shadow:0 1px 0 rgba(255,255,255,.95) inset,0 -8px 16px -10px rgba(0,0,0,.22) inset,0 12px 34px -12px var(--white-glow-hard)}
.btn-white:hover{transform:translateY(-2px);box-shadow:0 1px 0 rgba(255,255,255,.95) inset,0 -8px 16px -10px rgba(0,0,0,.22) inset,0 18px 44px -10px var(--blue-glow)}
.btn-ghost{background:linear-gradient(160deg,var(--glass-hi),var(--glass-lo));backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);color:var(--white);border:1px solid var(--line-strong);box-shadow:0 1px 0 rgba(255,255,255,.14) inset}
.btn-ghost:hover{transform:translateY(-2px);border-color:var(--blue);box-shadow:0 1px 0 rgba(255,255,255,.14) inset,0 12px 34px -12px var(--blue-glow)}
.arrow{display:inline-block;transition:transform .2s}
.btn:hover .arrow{transform:translateX(4px)}

/* ---------- NAV ---------- */
nav{position:sticky;top:0;left:0;right:0;z-index:100;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.015));backdrop-filter:blur(20px) saturate(1.3);-webkit-backdrop-filter:blur(20px) saturate(1.3);border-bottom:1px solid var(--line);box-shadow:0 1px 0 rgba(255,255,255,.08) inset}
.nav-in{display:flex;align-items:center;justify-content:space-between;height:68px}
.logo{font-weight:900;font-size:1.15rem;letter-spacing:-.02em;display:flex;align-items:center;gap:9px}
.logo-mark{width:26px;height:26px;background:linear-gradient(180deg,#FFFFFF,#DCE2F0);color:#0A0A0B;border-radius:8px;display:grid;place-items:center;font-family:var(--mono);font-size:.62rem;font-weight:600;position:relative;overflow:hidden;box-shadow:0 0 18px var(--white-glow),0 1px 0 rgba(255,255,255,.9) inset}
.logo-mark::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,var(--blue) 50%,transparent 70%);transform:translateX(-100%);animation:sheen 4s ease infinite;mix-blend-mode:screen}
@keyframes sheen{0%,60%{transform:translateX(-100%)}80%,100%{transform:translateX(100%)}}
.logo-mark span{position:relative;z-index:1}
.nav-links{display:flex;gap:32px;font-size:.9rem;font-weight:500;color:var(--muted)}
.nav-links a{transition:color .2s}
.nav-links a:hover{color:var(--white)}
.nav-cta{padding:10px 20px;font-size:.85rem}
@media(max-width:700px){.nav-links{display:none}}

/* ---------- HERO ---------- */
.hero{position:relative;padding:110px 0 90px;text-align:center;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:56px 56px;mask-image:radial-gradient(700px 520px at 50% 20%,#000 15%,transparent 75%);opacity:.28;pointer-events:none}

.welcome{display:inline-flex;align-items:center;gap:10px;font-style:italic;color:var(--muted);font-size:1.15rem;margin-bottom:18px;position:relative;z-index:1}
.welcome::before{content:"";width:30px;height:2px;background:var(--blue);box-shadow:0 0 12px var(--blue-glow);border-radius:2px}

h1.brand{position:relative;z-index:1;font-size:clamp(2.6rem,8vw,5.4rem);font-weight:900;line-height:1;letter-spacing:-.03em;margin:0 0 44px;text-shadow:0 0 40px var(--white-glow)}
h1.brand em{font-style:normal;position:relative;white-space:nowrap}
h1.brand em::after{content:"";position:absolute;left:0;right:0;bottom:.06em;height:.1em;background:var(--blue);border-radius:2px;z-index:-1;transform:scaleX(0);transform-origin:left;animation:underline .9s .4s cubic-bezier(.2,.8,.2,1) forwards;box-shadow:0 0 24px var(--blue-glow)}
@keyframes underline{to{transform:scaleX(1)}}

/* three feature tabs — same recipe as .pillar */
.tabs{position:relative;z-index:1;display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:820px;margin:0 auto 44px}
@media(max-width:760px){.tabs{grid-template-columns:1fr}}
.tab{border-radius:20px;padding:28px 22px;position:relative;overflow:hidden;transition:transform .25s,box-shadow .3s,border-color .3s}
.tab:hover{transform:translateY(-5px);box-shadow:0 1px 0 rgba(255,255,255,.15) inset,0 26px 60px -22px var(--blue-glow);border-color:var(--line-strong)}
.tab::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--blue);transform:scaleX(0);transform-origin:left;transition:transform .35s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 14px var(--blue-glow);z-index:1}
.tab:hover::before{transform:scaleX(1)}
.tab::after{content:"";position:absolute;top:0;left:-70%;width:55%;height:100%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.09) 45%,transparent 60%);transform:skewX(-18deg);transition:left .8s cubic-bezier(.2,.8,.2,1);pointer-events:none}
.tab:hover::after{left:115%}
.tab .ic{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid var(--line);box-shadow:0 1px 0 rgba(255,255,255,.12) inset;display:grid;place-items:center;margin:0 auto 16px;color:var(--white)}
.tab h3{font-size:1.02rem;font-weight:800;margin-bottom:6px}
.tab p{color:var(--muted);font-size:.86rem}

/* CTA */
.cta-wrap{position:relative;z-index:1;display:flex;justify-content:center;margin-bottom:22px}
.cta{position:relative;overflow:hidden;font-size:1.02rem;padding:17px 32px}
.cta::after{content:"";position:absolute;top:0;left:-70%;width:55%;height:100%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.35) 45%,transparent 60%);transform:skewX(-18deg);animation:ctasheen 5s ease-in-out infinite}
@keyframes ctasheen{0%,80%,100%{left:-70%}90%{left:120%}}

.hero-note{position:relative;z-index:1;font-family:var(--mono);font-size:.72rem;color:var(--muted)}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
  .liquid{opacity:.25}
}
</style>
</head>
<body>

<!-- liquid motion layer -->
<div class="liquid" aria-hidden="true">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>
<div class="grain" aria-hidden="true"></div>

<nav>
  <div class="wrap nav-in">
    <a href="#" class="logo"><span class="logo-mark"><span>AW</span></span>AW&nbsp;Trading</a>
    <div class="nav-links">
      <a href="#">Prop Firms</a>
      <a href="#">Indicator</a>
      <a href="#">Giveaways</a>
    </div>
    <a href="#" class="btn btn-white nav-cta">Discord</a>
  </div>
</nav>

<header class="hero">
  <div class="wrap">
    <div class="welcome">Welcome to</div>
    <h1 class="brand">AW <em>TRADING</em></h1>

    <div class="tabs">
      <div class="tab glass">
        <div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"/><circle cx="10" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
        <h3>Free Community</h3>
        <p>Join 6,600+ Members</p>
      </div>
      <div class="tab glass">
        <div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
        <h3>Trusted Prop Firms</h3>
        <p>Best Discounts</p>
      </div>
      <div class="tab glass">
        <div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12v9H4v-9"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg></div>
        <h3>Weekly Giveaways</h3>
        <p>Win Funded Accounts</p>
      </div>
    </div>

    <div class="cta-wrap">
      <a href="#" class="btn btn-white cta">Join Free Discord
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.317 4.369A19.8 19.8 0 0 0 15.99 3c-.211.375-.457.879-.626 1.278a18.3 18.3 0 0 0-5.487 0A12.7 12.7 0 0 0 9.25 3a19.7 19.7 0 0 0-4.327 1.37C1.87 8.6 1.13 12.72 1.5 16.78a19.9 19.9 0 0 0 5.993 3.03c.483-.66.913-1.36 1.284-2.1a12.8 12.8 0 0 1-2.023-.98c.17-.124.336-.253.497-.386 3.9 1.8 8.13 1.8 11.99 0 .163.133.328.262.497.386-.642.383-1.323.71-2.027.982.372.74.8 1.44 1.284 2.098a19.86 19.86 0 0 0 6.002-3.03c.428-4.71-.734-8.8-3.68-12.41ZM8.68 14.4c-1.18 0-2.14-1.086-2.14-2.42 0-1.335.94-2.42 2.14-2.42 1.21 0 2.16 1.095 2.14 2.42 0 1.334-.93 2.42-2.14 2.42Zm6.64 0c-1.18 0-2.14-1.086-2.14-2.42 0-1.335.95-2.42 2.14-2.42 1.21 0 2.16 1.095 2.14 2.42 0 1.334-.92 2.42-2.14 2.42Z"/></svg>
      </a>
    </div>
    <div class="hero-note">// No hype. Just structure — community, verified firms, real payouts.</div>
  </div>
</header>

<script>
if(!matchMedia('(prefers-reduced-motion: reduce)').matches){
  const blobs=document.querySelectorAll('.blob');
  addEventListener('pointermove',e=>{
    const x=(e.clientX/innerWidth-.5),y=(e.clientY/innerHeight-.5);
    blobs.forEach((b,i)=>{const f=(i+1)*7;b.style.translate=`${x*f}px ${y*f}px`});
  },{passive:true});
}
</script>
</body>
</html>
